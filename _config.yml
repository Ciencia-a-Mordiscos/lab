title: Ciencia a Mordiscos
author: Ciencia a Mordiscos
description: Notebooks reproducibles de papers científicos. Datos reales, código Python, gráficas verificables.
logo: _static/favicon.png

execute:
  execute_notebooks: "off"

html:
  favicon: _static/favicon.png
  use_issues_button: true
  use_repository_button: true
  use_edit_page_button: true
  extra_css:
    - _static/custom.css
  extra_footer: |
    <p>
      <a href="https://youtube.com/@CienciaaMordiscos">YouTube</a> ·
      <a href="https://tiktok.com/@cienciaamordiscos">TikTok</a> ·
      <a href="https://ko-fi.com/samumirandam">Ko-fi</a>
    </p>
    <p>CC-BY 4.0 · Ciencia a Mordiscos</p>

repository:
  url: https://github.com/Ciencia-a-Mordiscos/lab
  branch: main

launch_buttons:
  colab_url: "https://colab.research.google.com"

sphinx:
  config:
    html_static_path: ["_static"]
    html_extra_path: ["_extra"]
    copyright: "2026, Ciencia a Mordiscos"
    language: "es"
    html_js_files:
      - ["https://analytics.trellium.dev/script.js", {"data-website-id": "5ab57070-6c00-41d5-9bca-4e8164716505", "async": "async", "defer": "defer"}]
